name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.54.0 openpyxl==3.1.5 pandas==2.3.0 tldextract==5.3.0
          pip install pyinstaller
          python -m playwright install chromium --with-deps

      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile --noconsole --name "YandexAIChecker" --add-data "requests.txt;." main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: YandexAIChecker-Windows
          path: dist/YandexAIChecker.exe
          retention-days: 30

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YandexAIChecker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

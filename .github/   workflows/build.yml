name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'          # срабатывает при создании тега вида v1, v1.2, v2.0.0
  workflow_dispatch:  # позволяет запустить вручную кнопкой на GitHub

jobs:
  build:
    runs-on: windows-latest   # настоящая Windows-машина на серверах GitHub

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Ставим Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Устанавливаем браузер Playwright (Chromium)
      - name: Install Playwright Chromium
        run: playwright install chromium

      # 5. Собираем EXE
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile `
            --noconsole `
            --name "YandexAIChecker" `
            --add-data "requests.txt;." `
            main.py

      # 6. Проверяем что файл создан
      - name: Verify build
        run: |
          dir dist\
          echo "Build successful!"

      # 7. Загружаем EXE как артефакт (доступен в Actions → вкладка Artifacts)
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: YandexAIChecker-Windows
          path: dist/YandexAIChecker.exe
          retention-days: 30

      # 8. Если запуск был по тегу — прикрепляем EXE к GitHub Release
      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YandexAIChecker.exe
          body: |
            ## 🔎 Yandex AI Checker

            Автоматически собранный EXE для Windows.

            ### Как использовать
            1. Скачайте `YandexAIChecker.exe`
            2. Положите рядом файл `requests.txt` со списком запросов
            3. Запустите — откроется GUI

            ### Требования
            - Windows 10/11 (64-bit)
            - Интернет-подключение
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
